<div class ="p-3">
  <div class="card-body">
    <table class="table">
      <thread>
      <tr>
        <th>id</th>
        <th>name</th>
        <th>Price</th>
        <tr>Selected</tr>
      </tr>
      </thread>

    </table>
    <tbody>
      @for (p of products;track p){
        <tr>
          <td>{{p.id}}</td>
          <td>{{p.name}}</td>
          <td>{{p.price}}</td>
          <td>{{p.selected}}</td>
          <td><button class="btn btn-outline-primary" (click)="select(product)">Select</button></td>
        </tr>
      }
        </tbody>

  </div>
  <h1>Products</h1>
  <p>Here are our products.</p>

</div>
